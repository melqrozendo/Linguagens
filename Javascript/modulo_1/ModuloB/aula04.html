<!--Aula 04 - primeiros scripts

1-Armazenando dados
2-Tratamento de dados
3-Operação com dados

Criando script interno
-codigo de sitaxe:
<script>
    window.alert('Minha primeira mensagem!')
    window.confirm('Está gostando de JS?')
    window.prompt('Qual é seu nome?')
</script>

obs:
<html> -> conteudo
<style> -> estilo
<script> -> interação

Exemplos de sintaxe:

alert('ola,mundo')
document.body.style.background = 'black'
document.querySelector('img.lnXdpd').style.filter = 'grayscale(100%)'
document.querySelector('img.lnXdpd').style.visibility = 'hidden'

-->
<!DOCTYPE html>
<html lang="pt-br">
<head><!--parte de configurações-->
    <meta charset="UTF-8"><!--configura o caracter-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge"><!--configura a compatibilidade-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--configura o teclado-->
    <title>Primeiro codigo</title>
    <style>
        body{
            background-color: aqua;
            color: black;
            font: normal 16pt Arial;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Curso em Vídeo</p>
    <!--os scripts devem ser carregados apos o codigo base-->
    <!--criando script interno-->
    <script>
        window.alert('Minha primeira mensagem!')//comando de alerta
        window.confirm('Está gostando de JS?')//comando de confirmação
        window.prompt('Qual é seu nome?')//comando de caixa de texto
    </script>
</body>
</html>
