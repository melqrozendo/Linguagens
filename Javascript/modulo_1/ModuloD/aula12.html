ou

if (cond1) {
    <bloco1>

Condição Multiplas

sintaxe:
switch (expressão){
    case valor 1:
        <bloco1>
        break;
    case valor 2:
        <bloco2>
        break;
    case valor 3:
        <bloco3>
        break;
    default:
        break;
}
