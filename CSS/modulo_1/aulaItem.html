<head>

    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            color: #fff;
        }

        .item {
            margin: 5px;
            padding: 5px;
            background: #447;
            text-align: center;
            font-size: 1em;
            color: #fff;

        }

        .base1{

        }

        .ordem0{

        }

        .reduzir1{
            flex-shrink: 1;

        }

        .flex{
            flex: 1;
        }

        .top{
            align-self: flex-start;
        }

        .bottom{
            align-self: flex-end;
        }

        .container{
            max-width: 500px;
            height: 500px;
            margin: 0 auto;
            border: 1px solid #000;
        }

        .flexivel {
            display: flex;
        }
